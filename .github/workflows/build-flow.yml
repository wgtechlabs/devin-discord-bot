name: Build Flow

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  packages: write
  security-events: write
  issues: write
  pull-requests: write

concurrency:
  group: build-flow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-flow:
    uses: wgtechlabs/build-flow-action/.github/workflows/app.yml@e8c0dd4ee869c86b9a73415ec959e898dd1def0f # fix/container-pr-comment-toggle
    secrets: inherit
    with:
      ci-profile: auto
      ci-matrix-versions: '["22","24","26"]'
      codeql-build-mode: none
      enable-package: false
      enable-container: true
      container-registry: both
      container-pr-comment-enabled: false
