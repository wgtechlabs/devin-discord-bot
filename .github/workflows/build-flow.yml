name: Build Flow

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: build-flow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-flow:
    permissions:
      contents: read
      packages: write
      security-events: write
    uses: wgtechlabs/build-flow-action/.github/workflows/app.yml@4968a4d2d5fc123b30fdaf3e1dbe69a7539d42a0
    secrets: inherit
    with:
      ci-profile: auto
      ci-matrix-versions: '["22","24","26"]'
      codeql-build-mode: none
      enable-package: false
      enable-container: true
      container-registry: both
