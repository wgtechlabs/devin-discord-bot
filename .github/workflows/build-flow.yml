name: Build Flow

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  build-flow:
    uses: wgtechlabs/build-flow-action/.github/workflows/app.yml@v0
    secrets: inherit
    with:
      ci-profile: auto
      ci-matrix-versions: '["22","24","26"]'
      enable-package: false
      enable-container: false
