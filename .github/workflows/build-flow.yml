name: Build Flow

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: build-flow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-flow:
    uses: wgtechlabs/build-flow-action/.github/workflows/app.yml@08a57866c30d78b1d8448faa5e55efdff8bb86cf # v0.1.6
    secrets: inherit
    with:
      ci-profile: auto
      ci-matrix-versions: '["22","24","26"]'
      codeql-build-mode: none
      enable-package: false
      enable-container: true
      container-registry: both
